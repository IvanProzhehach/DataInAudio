services:
  - type: web
    name: acousteg-decode-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: ACOUSTEG_CLOUD_FAST
        value: "0"
      - key: ACOUSTEG_WS_BUFFER_SEC
        value: "22"
      - key: ACOUSTEG_MIC_MAX_SEC
        value: "20"
      - key: ACOUSTEG_MIC_TIMEOUT_SEC
        value: "40"
