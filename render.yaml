services:
  - type: web
    name: acousteg-decode-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: ACOUSTEG_CLOUD_FAST
        value: "1"
      - key: ACOUSTEG_WS_BUFFER_SEC
        value: "22"
